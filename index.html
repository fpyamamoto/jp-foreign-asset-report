<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>国外財産調書 提出義務チェッカー</title>
<meta name="description" content="12月31日時点の国外財産が5,000万円を超えるかを、財産の「所在」判定から確認する簡易チェックツール。">
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  --ink:#16202E;
  --ink-2:#33465C;
  --muted:#67788A;
  --paper:#EDF0F2;
  --card:#FFFFFF;
  --rule:#C9D2D9;
  --rule-2:#E2E8ED;
  --seal:#BE3A2B;
  --seal-deep:#8E2419;
  --seal-soft:#FBEDEB;
  --jade:#2B6A5F;
  --jade-soft:#E9F1EF;
  --warn:#8A6212;
  --warn-soft:#FBF3E0;
  --focus:#1F5FA8;

  --mincho: "Yu Mincho","YuMincho","Hiragino Mincho ProN","Hiragino Mincho Pro","MS PMincho",serif;
  --gothic: "Yu Gothic","YuGothic","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono: ui-monospace,"SFMono-Regular","SF Mono",Consolas,"Liberation Mono",Menlo,monospace;

  --sp:4px;
  --maxw:1180px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--gothic);
  font-size:15px;
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}
h1,h2,h3{font-family:var(--mincho);font-weight:600;letter-spacing:.02em;margin:0}
button,input,select,textarea{font:inherit;color:inherit}
a{color:var(--focus)}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
/* 日本語は文字単位で改行されるため、「…」で括った語が行末で分断される。
   まとめて折り返し禁止にする（付与は nb() が行う）。 */
.nb{white-space:nowrap}

/* ============================================================
   MASTHEAD
   ============================================================ */
.mast{
  border-bottom:1px solid var(--rule);
  background:var(--card);
}
/* [FIX 8] grid — not flex-wrap — so the tools stay pinned top-right
   however long the title runs in any language. */
.mast-in{
  max-width:var(--maxw);margin:0 auto;padding:22px 20px 18px;
  display:grid;grid-template-columns:minmax(0,1fr) auto;
  align-items:start;column-gap:24px;
}
.brand{min-width:0}
/* ch は「0」の字幅基準なので全角1文字が約2ch分を占める。日本語見出しに
   ch単位の上限をかけると意図せず折り返すため、上限は欧文の時だけかける。 */
.brand h1{font-size:25px;line-height:1.35}
.brand .kicker{
  font-size:11px;letter-spacing:.22em;color:var(--muted);
  text-transform:uppercase;font-family:var(--gothic);margin-bottom:6px;
  overflow-wrap:anywhere;
}
.brand .sub{font-size:13px;color:var(--muted);margin-top:4px;max-width:56ch}
html[lang="en"] .brand h1{font-size:20px;line-height:1.3;max-width:26ch}
html[lang="en"] .brand .kicker{letter-spacing:.14em}
.mast-tools{display:flex;gap:8px;align-items:center;justify-self:end;flex:0 0 auto}
@media(max-width:640px){
  .mast-in{grid-template-columns:1fr;row-gap:14px}
  .mast-tools{justify-self:start}
  .brand h1,html[lang="en"] .brand h1{font-size:19px}
}
.lang{display:inline-flex;border:1px solid var(--rule);border-radius:2px;overflow:hidden;background:var(--card)}
.lang button{
  border:0;background:transparent;padding:5px 11px;font-size:12px;letter-spacing:.08em;
  cursor:pointer;color:var(--muted);white-space:nowrap;
}
.lang button[aria-pressed="true"]{background:var(--ink);color:#fff}
.tbtn{
  border:1px solid var(--rule);background:var(--card);border-radius:2px;
  padding:5px 11px;font-size:12px;cursor:pointer;color:var(--ink-2);white-space:nowrap;
}
.tbtn:hover{border-color:var(--ink-2)}

/* ============================================================
   LAYOUT
   ============================================================ */
.wrap{max-width:var(--maxw);margin:0 auto;padding:24px 20px 80px;display:grid;grid-template-columns:1fr 330px;gap:26px;align-items:start}
@media(max-width:960px){.wrap{grid-template-columns:1fr;padding-bottom:150px}}

/* ============================================================
   STEP
   ============================================================ */
.step{background:var(--card);border:1px solid var(--rule-2);border-radius:3px;margin-bottom:16px}
.step-hd{
  display:flex;gap:12px;align-items:baseline;
  padding:14px 18px;border-bottom:1px solid var(--rule-2);
}
.step-no{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  border:1px solid var(--rule);border-radius:2px;padding:1px 6px;flex:0 0 auto;
}
.step-hd h2{font-size:17px}
.step-hd .req{
  font-size:10px;letter-spacing:.1em;color:var(--seal);border:1px solid currentColor;
  padding:0 5px;border-radius:2px;margin-left:auto;flex:0 0 auto;
}
.step-bd{padding:16px 18px}

.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.lab{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.help{font-size:12.5px;color:var(--muted);line-height:1.7;margin:6px 0 0}
.help a{color:var(--focus)}

/* choice */
.choices{display:grid;gap:7px}
.choice{
  display:flex;gap:10px;align-items:flex-start;
  border:1px solid var(--rule);border-radius:3px;padding:9px 12px;cursor:pointer;background:#fff;
}
.choice:hover{border-color:var(--ink-2);background:#FAFCFD}
.choice input{margin:5px 0 0;accent-color:var(--ink);flex:0 0 auto}
.choice.on{border-color:var(--ink);background:#F4F8FA;box-shadow:inset 3px 0 0 var(--ink)}
.choice .ctxt{font-size:13.5px}
.choice .cnote{display:block;font-size:12px;color:var(--muted);margin-top:2px;line-height:1.6}

select,input[type=text],input[type=number]{
  width:100%;border:1px solid var(--rule);border-radius:3px;background:#fff;padding:8px 10px;font-size:14px;
}
input[type=number]{font-family:var(--mono);text-align:right}
select:hover,input:hover{border-color:var(--ink-2)}

/* disclosure */
/* [FIX 1,2,3,4] every "+" states, before it is opened, who needs to open it */
.disc{border-top:1px dashed var(--rule);margin-top:14px;padding-top:12px}
.disc>summary{
  cursor:pointer;list-style:none;display:grid;grid-template-columns:14px 1fr;
  column-gap:8px;align-items:start;
}
.disc>summary::-webkit-details-marker{display:none}
.disc>summary::before{content:"＋";font-family:var(--mono);color:var(--muted);font-size:12px;line-height:1.7}
.disc[open]>summary::before{content:"−"}
.disc>summary:hover .disc-t{color:var(--ink);text-decoration:underline}
.disc-t{font-size:12.5px;color:var(--ink-2);font-weight:600}
.disc-who{
  display:block;font-size:12px;color:var(--muted);line-height:1.65;margin-top:1px;
  grid-column:2;font-weight:400;
}
.disc-bd{padding-top:12px;padding-left:22px}
@media(max-width:520px){.disc-bd{padding-left:0}}

/* ============================================================
   ASSET ROWS
   ============================================================ */
.rows{display:grid;gap:14px}
.row{border:1px solid var(--rule);border-radius:3px;background:#fff;position:relative;overflow:hidden}
.row-hd{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  background:#F6F8F9;border-bottom:1px solid var(--rule-2);
}
.row-ix{font-family:var(--mono);font-size:11px;color:var(--muted)}
.row-hd select{flex:1;min-width:0}
.row-del{
  border:1px solid var(--rule);background:#fff;border-radius:2px;width:26px;height:26px;
  cursor:pointer;color:var(--muted);line-height:1;flex:0 0 auto;font-size:15px;
}
.row-del:hover{color:var(--seal);border-color:var(--seal)}
.row-bd{padding:14px 12px;display:grid;gap:12px}

.wiz{border-left:2px solid var(--rule-2);padding-left:12px;display:grid;gap:12px}
.wiz-q .qlab{font-size:12.5px;font-weight:600;display:block;margin-bottom:5px}
.wiz-q .choices{gap:5px}
.wiz-q .choice{padding:7px 10px}
.wiz-q .choice .ctxt{font-size:13px}

.money{display:grid;grid-template-columns:104px 1fr 1fr;gap:8px;align-items:end}
@media(max-width:520px){.money{grid-template-columns:1fr 1fr}}
.money .mlab{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;letter-spacing:.04em}
.jpy-out{
  border-top:1px solid var(--rule-2);padding-top:9px;display:flex;justify-content:space-between;
  align-items:baseline;gap:10px;font-size:12.5px;color:var(--muted);
}
.jpy-out b{font-family:var(--mono);font-size:17px;color:var(--ink);font-weight:600}
.jpy-out b.neg{color:var(--seal)}

/* seal — the signature element */
.seal{
  position:absolute;top:44px;right:14px;width:66px;height:66px;border-radius:50%;
  display:grid;place-items:center;font-family:var(--mincho);font-weight:600;
  font-size:19px;letter-spacing:.06em;pointer-events:none;
  transform:rotate(-9deg);z-index:2;
}
.seal::before{
  content:"";position:absolute;inset:0;border-radius:50%;border:2.5px solid currentColor;opacity:.85;
}
.seal::after{
  content:"";position:absolute;inset:5px;border-radius:50%;border:1px solid currentColor;opacity:.4;
}
.seal.foreign{color:var(--seal)}
.seal.domestic{color:var(--jade);opacity:.55}
.seal-in{position:relative;z-index:1;text-align:center;line-height:1.05}
.seal-in small{display:block;font-size:8px;letter-spacing:.12em;opacity:.8;font-family:var(--gothic);margin-top:2px}
@keyframes stamp{
  0%{transform:rotate(-9deg) scale(1.9);opacity:0}
  55%{transform:rotate(-9deg) scale(.92);opacity:1}
  100%{transform:rotate(-9deg) scale(1);opacity:1}
}
.seal.anim{animation:stamp .34s cubic-bezier(.2,.9,.3,1.2) both}
.row.is-foreign{box-shadow:inset 4px 0 0 var(--seal)}
.row.is-domestic{opacity:.94}
.row.is-domestic .row-bd{background:#FCFDFD}
@media(prefers-reduced-motion:reduce){.seal.anim{animation:none}}
@media(max-width:520px){.seal{width:54px;height:54px;font-size:15px;top:40px;right:8px}}

.verdict-note{
  font-size:12px;border-radius:2px;padding:7px 10px;line-height:1.65;
}
.verdict-note.dom{background:var(--jade-soft);color:var(--jade)}
.verdict-note.for{background:var(--seal-soft);color:var(--seal)}
.verdict-note.exc{background:var(--warn-soft);color:var(--warn)}

.addrow{
  width:100%;border:1px dashed var(--rule);background:transparent;border-radius:3px;
  padding:11px;cursor:pointer;color:var(--ink-2);font-size:13.5px;margin-top:14px;
}
.addrow:hover{border-color:var(--ink);border-style:solid;background:#fff}

.callout{
  border:1px solid var(--rule-2);background:#F8FAFB;border-radius:3px;padding:10px 12px;
  font-size:12.5px;color:var(--ink-2);line-height:1.7;
}
.callout b{color:var(--ink)}

/* ============================================================
   PANEL
   ============================================================ */
.panel{position:sticky;top:16px}
.panel-card{background:var(--card);border:1px solid var(--rule);border-radius:3px;overflow:hidden}
.panel-hd{padding:13px 16px 11px;border-bottom:1px solid var(--rule-2)}
.panel-hd .plab{font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.panel-hd h2{font-size:16px;margin-top:2px}
.panel-bd{padding:16px}

.total{font-family:var(--mono);font-size:29px;font-weight:600;line-height:1.15;letter-spacing:-.02em}
.total small{font-size:14px;font-weight:400;color:var(--muted);margin-left:3px}
.total-lab{font-size:11.5px;color:var(--muted);letter-spacing:.06em}

/* gauge */
.gauge{margin:16px 0 6px;position:relative;height:9px;background:#E7ECEF;border-radius:1px;overflow:visible}
.gauge-fill{height:100%;background:var(--jade);border-radius:1px;transition:width .35s ease,background .25s}
.gauge.over .gauge-fill{background:var(--seal)}
.gauge-mark{position:absolute;top:-6px;bottom:-6px;left:66.6667%;width:1px;background:var(--ink)}
.gauge-mark::after{
  content:attr(data-l);position:absolute;top:-17px;left:50%;transform:translateX(-50%);
  font-size:9.5px;color:var(--ink);white-space:nowrap;font-family:var(--mono);letter-spacing:.02em;
}
.gauge-wrap{padding-top:18px}
@media(prefers-reduced-motion:reduce){.gauge-fill{transition:none}}

.judg{margin-top:20px;border-top:1px solid var(--rule-2);padding-top:15px}
.judg-badge{
  display:inline-block;font-family:var(--mincho);font-size:18px;font-weight:600;
  padding:5px 13px;border:1.5px solid currentColor;border-radius:2px;letter-spacing:.04em;
}
.judg-badge.yes{color:var(--seal);background:var(--seal-soft)}
.judg-badge.no{color:var(--jade);background:var(--jade-soft)}
.judg-badge.na{color:var(--muted);background:#F4F6F7;font-size:15px}
.judg-why{font-size:12.5px;color:var(--ink-2);margin-top:10px;line-height:1.75}

/* [FIX 5] deadline clock */
.clock{margin-top:10px;font-size:12px;border-radius:2px;padding:6px 9px;line-height:1.6}
.clock.future{background:#F0F4F7;color:var(--ink-2)}
.clock.soon{background:var(--warn-soft);color:var(--warn);font-weight:600}
.clock.past{background:var(--seal-soft);color:var(--seal);font-weight:600}

.kv{border-top:1px solid var(--rule-2);margin-top:15px;padding-top:12px;display:grid;gap:9px}
.kv-r{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;align-items:baseline}
.kv-r dt{color:var(--muted);flex:0 0 auto}
.kv-r dd{margin:0;text-align:right;font-weight:600}
.kv-r dd .num{font-size:13px}

.panel-acts{display:grid;gap:7px;margin-top:16px}
.pbtn{
  border:1px solid var(--rule);background:#fff;border-radius:2px;padding:8px;font-size:12.5px;
  cursor:pointer;color:var(--ink-2);
}
.pbtn:hover{border-color:var(--ink);color:var(--ink)}
.pbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.pbtn.primary:hover{background:#0C1523}
.copied{font-size:11.5px;color:var(--jade);text-align:center;min-height:16px}

@media(max-width:960px){
  .panel{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:40;padding:0}
  .panel-card{border-radius:0;border-left:0;border-right:0;border-bottom:0;box-shadow:0 -6px 22px rgba(22,32,46,.13)}
  .panel-hd{display:none}
  .panel-bd{padding:11px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .panel-bd .total{font-size:21px}
  .gauge-wrap{flex:1;min-width:130px;padding-top:16px}
  .gauge{margin:0}
  .judg{margin:0;border:0;padding:0}
  .judg-why,.kv,.panel-acts,.copied,.clock{display:none}
  .panel.expand .judg-why,.panel.expand .kv,.panel.expand .panel-acts,.panel.expand .copied,.panel.expand .clock{display:block;width:100%}
  .panel.expand .kv,.panel.expand .panel-acts{display:grid}
  .panel-toggle{display:block !important}
}
.panel-toggle{display:none;width:100%;border:0;background:transparent;font-size:11.5px;color:var(--muted);cursor:pointer;padding:2px}

/* ============================================================
   RESULT
   ============================================================ */
.result{margin-top:22px}
.res-card{background:var(--card);border:1px solid var(--rule);border-radius:3px;overflow:hidden}
.res-hd{padding:15px 18px;border-bottom:1px solid var(--rule-2);background:#F6F8F9}
.res-hd h2{font-size:18px}
.res-hd p{margin:4px 0 0;font-size:12.5px;color:var(--muted)}
.res-bd{padding:0}
.res-sec{border-bottom:1px solid var(--rule-2);padding:15px 18px}
.res-sec:last-child{border-bottom:0}
.res-sec h3{font-size:14.5px;margin-bottom:7px}
.res-sec p{margin:0 0 8px;font-size:13px;line-height:1.8;color:var(--ink-2)}
.res-sec p:last-child{margin-bottom:0}
.res-sec ul{margin:0;padding-left:1.15em;font-size:13px;line-height:1.8;color:var(--ink-2)}
.res-sec li{margin-bottom:4px}
.res-sec.urgent{border-left:3px solid var(--seal);background:#FEF8F7}

/* [FIX 7] penalty blocks — colour carries the meaning, one peak only.
   The 5% reduction is good news, so it is green, not red. */
.pen{border-radius:2px;padding:10px 12px;margin:0 0 9px;font-size:13px;line-height:1.8}
.pen:last-child{margin-bottom:0}
.pen.good{background:var(--jade-soft);color:var(--jade);border-left:3px solid var(--jade)}
.pen.bad{background:var(--seal-soft);color:var(--seal-deep);border-left:3px solid var(--seal)}
.pen.bad b{color:var(--seal)}
.pen.crit{background:var(--seal);color:#fff;border-left:3px solid var(--seal-deep);font-weight:500}
.pen.crit b{color:#fff;text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1.5px}
.tag{
  display:inline-block;font-size:10px;letter-spacing:.1em;padding:1px 6px;border-radius:2px;
  vertical-align:middle;margin-left:7px;font-family:var(--gothic);
}
.tag.d{background:var(--seal-soft);color:var(--seal)}
.tag.i{background:#EEF3F8;color:var(--focus)}

.breakdown{width:100%;border-collapse:collapse;font-size:12.5px}
.breakdown th,.breakdown td{border-bottom:1px solid var(--rule-2);padding:6px 8px;text-align:left}
.breakdown th{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.breakdown td:last-child,.breakdown th:last-child{text-align:right;font-family:var(--mono)}
.breakdown tr.dom td{color:var(--muted)}
.breakdown tfoot td{font-weight:700;border-bottom:0;border-top:1.5px solid var(--ink)}

.disclaimer{
  border:1px solid var(--seal);border-left-width:3px;background:var(--seal-soft);border-radius:3px;
  padding:13px 15px;margin-top:18px;font-size:12.5px;line-height:1.8;color:#7A2519;
}
.disclaimer b{display:block;font-family:var(--mincho);font-size:14px;margin-bottom:4px;color:var(--seal)}

/* ============================================================
   FOOT
   ============================================================ */
.foot{border-top:1px solid var(--rule);background:var(--card);margin-top:0}
.foot-in{max-width:var(--maxw);margin:0 auto;padding:26px 20px 34px;font-size:12px;color:var(--muted);line-height:1.85}
.foot h3{font-size:12.5px;color:var(--ink);margin-bottom:6px;font-family:var(--gothic);letter-spacing:.04em}
.foot ul{margin:0 0 16px;padding-left:1.1em}
.foot li{margin-bottom:3px}
.foot .ref{color:var(--muted);font-size:11.5px}
.foot .meta{border-top:1px solid var(--rule-2);padding-top:12px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
.foot code{font-family:var(--mono);font-size:11px}

/* ============================================================
   PRINT
   ============================================================ */
@media print{
  body{background:#fff;font-size:10.5pt}
  .mast-tools,.panel-acts,.addrow,.row-del,.lang,.tbtn,.panel-toggle,.copied{display:none !important}
  .wrap{display:block;max-width:none;padding:0}
  .panel{position:static;page-break-inside:avoid}
  .panel-card,.step,.res-card{border:1px solid #999;box-shadow:none;page-break-inside:avoid}
  .row{page-break-inside:avoid}
  .disc{display:none}
  .disc[open]{display:block}
  .seal,.gauge-fill,.judg-badge,.disclaimer,.verdict-note,.pen,.clock{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .foot{border-top:1px solid #999}
  a[href^="http"]::after{content:" (" attr(href) ")";font-size:8pt;color:#666}
}
</style>
</head>
<body>

<header class="mast">
  <div class="mast-in">
    <div class="brand">
      <div class="kicker" data-t="app.kicker"></div>
      <h1 data-t="app.title"></h1>
      <p class="sub" data-t="app.sub"></p>
    </div>
    <div class="mast-tools">
      <div class="lang" role="group" aria-label="Language">
        <button type="button" data-lang="ja" aria-pressed="true">日本語</button>
        <button type="button" data-lang="en" aria-pressed="false">EN</button>
      </div>
      <button type="button" class="tbtn" id="reset" data-t="act.reset"></button>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="main-col">

    <!-- STEP 1 : 対象者 -->
    <section class="step">
      <div class="step-hd">
        <span class="step-no">01</span>
        <h2 data-t="s1.title"></h2>
        <span class="req" data-t="ui.required"></span>
      </div>

   1. DATA — 制度データ。ロジックから分離。改正時はここだけ差し替える。

const RULES = {
  updated: "2026-07-15",
  basis: { taxanswer: "令和7年6月1日現在法令等", faq: "令和5年4月版" },
  threshold: 50000000,          // 5,000万円「超」（以上ではない）
  // [FIX 5] 年は固定リストではなく現在の年から自動生成する。毎年の手当てが不要。
  yearFloor: 2022,
  soonDays: 90,                 // 期限まで何日で警告色に切り替えるか
  // 提出期限：令和5年分（2023年分）以後は翌年6/30。令和4年分（2022年分）以前は翌年3/15。
  deadline: { pivotYear: 2023, newRule: { m: 5, d: 30 }, oldRule: { m: 2, d: 15 } },
  currencies: ["JPY","USD","EUR","GBP","AUD","NZD","CAD","CHF","SGD","HKD","CNY","KRW","TWD","THB","MYR","PHP","IDR","VND","INR","KHR","LAK","BDT","AED","BRL","MXN","ZAR"],
  sources: [
    { key: "src.nta7456", url: "https://www.nta.go.jp/taxes/shiraberu/taxanswer/hotei/7456.htm" },
    { key: "src.faq",     url: "https://www.nta.go.jp/publication/pamph/hotei/kokugai_zaisan/pdf/kokugai_faq_r5-1.pdf" },
    { key: "src.pamph",   url: "https://www.nta.go.jp/publication/pamph/hotei/kokugai_zaisan/index.htm" },

  ],
  // 一次情報ではないので出典とは分けて掲げる（[FIX 4]）
  refs: [
    { key: "ref.murc", url: "https://www.murc-kawasesouba.jp/fx/past_3month.php" }
  ],
  /* 財産の区分（名前のついた7区分＋受け皿）と所在判定ウィザード。
     verdict = "foreign" | "domestic" | null(未回答)
     根拠：国外送金等調書法5③／令10①②／規12③④／相続税法10①②／FAQ Q6・Q22・Q23・Q36 */
  categories: {
    realestate: {
      questions: [{ id: "loc", opts: ["jp", "fr"] }],
      resolve: a => a.loc ? (a.loc === "fr" ? "foreign" : "domestic") : null
    },
    deposit: {
      questions: [{ id: "branch", opts: ["jp", "fr"] }],
      resolve: a => a.branch ? (a.branch === "fr" ? "foreign" : "domestic") : null
    },
    securities: {
      // FAQ Q23：口座で管理していれば口座の所在が優先。口座がなければ発行体基準。
      questions: [
        { id: "issuer", opts: ["jpco", "frco", "jpbond", "frbond"] },
        { id: "account", opts: ["jpacc", "fracc", "none"] }
      ],
      resolve: a => {
        if (!a.issuer || !a.account) return null;
        if (a.account === "fracc") return "foreign";
        if (a.account === "jpacc") return "domestic";
        return (a.issuer === "frco" || a.issuer === "frbond") ? "foreign" : "domestic";
      }
    },
    loan: {
      questions: [{ id: "debtor", opts: ["jp", "fr"] }],
      resolve: a => a.debtor ? (a.debtor === "fr" ? "foreign" : "domestic") : null
    },
    insurance: {
      questions: [{ id: "insurer", opts: ["jp", "fr"] }],
      resolve: a => a.insurer ? (a.insurer === "fr" ? "foreign" : "domestic") : null
    },
    crypto: {
      // 規12③六：保有者の住所で判定。居住者が対象者なので常に国内＝対象外。
      questions: [],
      auto: true,
      resolve: () => "domestic"
    },
    movables: {
      questions: [
        { id: "place", opts: ["jp", "fr"] },
        { id: "kind", opts: ["cash", "art", "metal", "other"], when: a => a.place === "fr" }
      ],
      resolve: a => {
        if (!a.place) return null;
        if (a.place === "jp") return "domestic";
        return a.kind ? "foreign" : null;
      },
      // 別表第一：書画骨とう・その他の動産は1個/1組10万円未満なら記載不要
      excludable: a => a.place === "fr" && (a.kind === "art" || a.kind === "other")
    },
    other: {
      questions: [
        { id: "sub", opts: ["deposit_money", "partnership", "trust", "ip", "copyright", "derivative", "residual"] },
        { id: "where", opts: ["jp", "fr"], when: a => a.sub && a.sub !== "residual" }
      ],
      resolve: a => {
        if (!a.sub) return null;
        if (a.sub === "residual") return "domestic"; // 規12③六：保有者の住所＝国内（居住者）
        return a.where ? (a.where === "fr" ? "foreign" : "domestic") : null;
      },
      allowNegative: a => a.sub === "derivative"
    }
  },
  // [FIX 6] 名前のついた7区分と、受け皿の「その他の財産」を分けて持つ。
  // 文言の「7区分」はこの配列長から導くので、区分を足しても数字がずれない。
  namedCats: ["realestate", "deposit", "securities", "loan", "insurance", "crypto", "movables"],
  catchAll: "other"
};
RULES.catOrder = RULES.namedCats.concat([RULES.catchAll]);

/* ============================================================================
   3. STATE
   ============================================================================ */
let lang = "ja";
let S = null;
let seq = 0;

/* [FIX 5] 年は毎年手で足すのではなく、現在の年から導く */
function currentYear() { return new Date().getFullYear(); }
function yearList() {
  const out = [];
  for (let y = RULES.yearFloor; y <= currentYear(); y++) out.push(y);
  return out;
}
function defaultYear() {
  const y = currentYear() - 1;
  return y < RULES.yearFloor ? RULES.yearFloor : y;
}
function blankState() {
  return { year: defaultYear(), residency: "", exempt: false, inherit: false, rows: [] };
}
function newRow() {
  return { id: ++seq, cat: "", ans: {}, ccy: "JPY", amt: "", rate: "", share: "", excl: false, inh: false, label: "" };
}

/* ============================================================================
   4. HELPERS
   ============================================================================ */
function t(key, vars) {
  let s = (I18N[lang] && I18N[lang][key]);
  if (s === undefined) s = (I18N.ja[key] !== undefined ? I18N.ja[key] : key);
  // [FIX 6] {cats} は「名前のついた区分の数」。区分を足しても文言がずれない。
  // {n} は件数・日数で使うので別名にしてある。
  s = s.split("{cats}").join(RULES.namedCats.length);
  if (vars) for (const k in vars) s = s.split("{" + k + "}").join(vars[k]);
  return s;
}
function has(key) { return I18N[lang][key] !== undefined || I18N.ja[key] !== undefined; }
/* [FIX 1] 「…」で括った語は一続きの用語なので、行末で分断させない。
   タグを跨ぐ場合（< > を含む）は対象外にして、既存のマークアップを壊さない。
   el() を通す全ての描画に効く。 */
function nb(html) {
  return String(html).replace(/「[^」<>]{1,14}」/g, m => '<span class="nb">' + m + "</span>");
}
function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html !== undefined) n.innerHTML = nb(html);
  return n;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmt(n) {
  const neg = n < 0;
  const s = Math.abs(Math.trunc(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return (neg ? "-" : "") + s;
}
function reiwa(y) { return y - 2018; }
function yearLabel(y) {
  return t(y === currentYear() ? "s2.yearLabelNow" : "s2.yearLabel", { y: y, r: reiwa(y) });
}

/** 提出期限。土日に当たれば翌開庁日へ（国税通則法10②）。6月30日・3月15日は国民の祝日に当たらない。 */
function deadlineOf(year) {
  const r = RULES.deadline;
  const spec = year >= r.pivotYear ? r.newRule : r.oldRule;
  const orig = new Date(year + 1, spec.m, spec.d);
  const d = new Date(orig.getTime());
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
  return { orig, actual: d, rolled: d.getTime() !== orig.getTime(), oldRule: year < r.pivotYear };
}
/** [FIX 5] 対象年の12/31・提出期限と、今日との位置関係。
    既定表示の年分の期限が既に過ぎている、という状況が普通に起きるため。 */
function clockOf(year) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const yearEnd = new Date(year, 11, 31);
  const dl = deadlineOf(year);
  if (today <= yearEnd) return { state: "progress", dl };
  const days = Math.round((dl.actual - today) / 86400000);
  if (days < 0) return { state: "past", days: -days, dl };
  if (days === 0) return { state: "today", days: 0, dl };
  return { state: days <= RULES.soonDays ? "soon" : "left", days, dl };
}
function fmtDate(d) {
  if (lang === "ja") {
    const w = "日月火水木金土"[d.getDay()];
    return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日（" + w + "）";
  }
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
}

/* 1行の判定 */
function rowVerdict(r) {
  const c = RULES.categories[r.cat];
  if (!c) return null;
  return c.resolve(r.ans);
}
function rowExcludable(r) {
  const c = RULES.categories[r.cat];
  return !!(c && c.excludable && c.excludable(r.ans));
}
function rowAllowNegative(r) {
  const c = RULES.categories[r.cat];
  return !!(c && c.allowNegative && c.allowNegative(r.ans));
}
function rowJPY(r) {
  const a = parseFloat(r.amt);
  if (!isFinite(a)) return null;
  const rate = r.ccy === "JPY" ? 1 : parseFloat(r.rate);
  if (!isFinite(rate) || rate <= 0) return null;
  let sh = parseFloat(r.share);
  if (!isFinite(sh) || sh < 0 || sh > 100) sh = 100;
  return Math.trunc(a * rate * (sh / 100));
}
/** 合計に算入されるか */
function rowCounts(r) {
  if (rowVerdict(r) !== "foreign") return false;
  if (r.excl && rowExcludable(r)) return false;
  if (S.inherit && r.inh) return false;
  return true;
}
/** 設問が未回答の行か */
function rowPending(r) {
  if (!r.cat) return true;
  return rowVerdict(r) === null;
}

function judge() {
  if (!S.residency) return { code: "na" };
  if (S.residency === "nonperm") return { code: "nonperm" };
  if (S.residency === "nonres") return { code: "nonres" };
  if (S.exempt) return { code: "exempt" };
  if (!S.rows.length) return { code: "norows" };
  const pending = S.rows.filter(rowPending).length;
  let total = 0, cnt = 0, excl = 0;
  S.rows.forEach(r => {
    if (rowVerdict(r) === "foreign" && ((r.excl && rowExcludable(r)) || (S.inherit && r.inh))) excl++;
    if (!rowCounts(r)) return;
    const v = rowJPY(r);
    if (v === null) return;
    total += v; cnt++;
  });
  if (pending) return { code: "pending", n: pending, total, cnt, excl };
  return { code: total > RULES.threshold ? "yes" : "no", total, cnt, excl };
}
function totalNow() {
  let total = 0;
  S.rows.forEach(r => { if (rowCounts(r)) { const v = rowJPY(r); if (v !== null) total += v; } });
  return total;
}

/* ============================================================================
   5. RENDER — rows
   ============================================================================ */
function renderRows() {
  const host = document.getElementById("rows");
  host.innerHTML = "";
  if (!S.rows.length) {
    host.appendChild(el("p", "help", esc(t("row.empty"))));
    return;
  }
  S.rows.forEach((r, i) => host.appendChild(rowNode(r, i)));
}

function rowNode(r, i) {
  const verdict = rowVerdict(r);
  const node = el("div", "row" + (verdict === "foreign" ? " is-foreign" : verdict === "domestic" ? " is-domestic" : ""));
  node.dataset.id = r.id;

  /* header */
  const hd = el("div", "row-hd");
  hd.appendChild(el("span", "row-ix", String(i + 1).padStart(2, "0")));
  const sel = el("select");
  sel.setAttribute("aria-label", t("s3.selectCat"));
  sel.appendChild(new Option(t("s3.selectCat"), ""));
  RULES.catOrder.forEach(k => {
    const o = new Option(t("cat." + k), k);
    if (r.cat === k) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => { r.cat = sel.value; r.ans = {}; r.excl = false; refresh(true); };
  hd.appendChild(sel);
  const del = el("button", "row-del", "×");
  del.type = "button";
  del.title = t("row.remove");
  del.setAttribute("aria-label", t("row.remove"));
  del.onclick = () => { S.rows = S.rows.filter(x => x.id !== r.id); refresh(true); };
  hd.appendChild(del);
  node.appendChild(hd);

  if (!r.cat) return node;

  /* seal */
  if (verdict) {
    const seal = el("div", "seal " + (verdict === "foreign" ? "foreign" : "domestic") + (r._stamp ? " anim" : ""));
    seal.setAttribute("aria-hidden", "true");
    seal.innerHTML = '<span class="seal-in">' + t("seal." + verdict) + "<small>" + t("seal." + verdict + ".n") + "</small></span>";
    node.appendChild(seal);
    r._stamp = false;
  }

  const bd = el("div", "row-bd");
  const cfg = RULES.categories[r.cat];

  /* label */
  const lf = el("div");
  const ll = el("label", "mlab");
  ll.textContent = t("row.label");
  ll.style.cssText = "font-size:11px;color:var(--muted);display:block;margin-bottom:4px;letter-spacing:.04em";
  const li = el("input");
  li.type = "text"; li.value = r.label; li.placeholder = t("row.labelPh");
  li.style.maxWidth = "calc(100% - 76px)";
  li.oninput = () => { r.label = li.value; refresh(false); };
  lf.appendChild(ll); lf.appendChild(li);
  bd.appendChild(lf);

  /* wizard */
  const wiz = el("div", "wiz");
  if (cfg.auto) {
    wiz.appendChild(el("p", "verdict-note dom", t("q." + r.cat + ".auto")));
  } else {
    cfg.questions.forEach(q => {
      if (q.when && !q.when(r.ans)) return;
      wiz.appendChild(questionNode(r, q));
    });
  }
  /* movables exclusion */
  if (rowExcludable(r)) {
    const w = el("div", "wiz-q");
    const lab = el("label", "choice" + (r.excl ? " on" : ""));
    const cb = el("input"); cb.type = "checkbox"; cb.checked = !!r.excl;
    cb.onchange = () => { r.excl = cb.checked; refresh(true); };
    const sp = el("span", "ctxt", esc(t("q.movables.exclude")) + '<span class="cnote">' + t("q.movables.excludeNote") + "</span>");
    lab.appendChild(cb); lab.appendChild(sp);
    w.appendChild(lab);
    wiz.appendChild(w);
  }
  bd.appendChild(wiz);

  /* verdict note */
  if (verdict) {
    let cls = verdict === "foreign" ? "for" : "dom";
    let msg = t("v." + verdict);
    if (verdict === "foreign" && r.excl && rowExcludable(r)) { cls = "exc"; msg = t("v.excluded"); }
    else if (verdict === "foreign" && S.inherit && r.inh) { cls = "exc"; msg = t("v.inherited"); }
    bd.appendChild(el("div", "verdict-note " + cls, msg));
  }

  /* money */
  if (verdict) {
    const neg = rowAllowNegative(r);
    if (neg) bd.appendChild(el("p", "help", t("q.other.derivativeNote")));

    const m = el("div", "money");
    const ri = el("input");   // 先に生成する。通貨を変えたとき、行を作り直さずに直接触るため。

    /** 円のときはレート欄を塞ぐ。行の再描画を伴わないので入力中でも呼べる。 */
    function syncRate() {
      const jpy = (r.ccy === "JPY");
      ri.disabled = jpy;
      ri.placeholder = jpy ? "—" : "0.00";
      ri.style.background = jpy ? "#F4F6F7" : "";
      ri.value = jpy ? "" : r.rate;
    }

    /* [FIX 2] 通貨は datalist 付きテキストではなく本物の <select>。
       旧実装は oninput ごとに refresh(true) で全行を作り直しており、
       フォーカスが飛んで1文字ずつしか消せず、一覧も開いた瞬間に閉じていた。 */
    const custom = RULES.currencies.indexOf(r.ccy) < 0;
    const c1 = el("div");
    c1.appendChild(el("span", "mlab", esc(t("row.currency"))));
    const cs = el("select");
    cs.setAttribute("aria-label", t("row.currency"));
    cs.style.fontFamily = "var(--mono)";
    RULES.currencies.forEach(c => {
      const o = new Option(c, c);
      if (!custom && r.ccy === c) o.selected = true;
      cs.appendChild(o);
    });
    const oth = new Option(t("row.ccyOther"), "__other");
    if (custom) oth.selected = true;
    cs.appendChild(oth);
    cs.onchange = () => {
      r.ccy = (cs.value === "__other") ? "" : cs.value;
      refresh(true);          // 自由入力欄の出し入れがあるので、ここだけは作り直す
    };
    c1.appendChild(cs);

    if (custom) {
      const cf = el("input");
      cf.type = "text"; cf.value = r.ccy; cf.placeholder = "XXX"; cf.maxLength = 4;
      cf.setAttribute("list", "ccy-list");
      cf.setAttribute("aria-label", t("row.ccyFree"));
      cf.style.cssText = "margin-top:5px;text-align:center;font-family:var(--mono)";
      cf.oninput = () => {
        const up = cf.value.toUpperCase();
        if (cf.value !== up) {           // 大文字化でキャレットが末尾へ飛ばないように
          const at = cf.selectionStart;
          cf.value = up;
          cf.setSelectionRange(at, at);
        }
        r.ccy = up;
        syncRate();
        refresh(false);                  // 行は作り直さない＝フォーカスを保つ
      };
      c1.appendChild(cf);
    }
    m.appendChild(c1);

    const c2 = el("div");
    c2.appendChild(el("span", "mlab", esc(t("row.amount"))));
    const ai = el("input");
    ai.type = "number"; ai.value = r.amt; ai.step = "any"; ai.placeholder = "0";
    if (!neg) ai.min = "0";
    ai.setAttribute("aria-label", t("row.amount"));
    ai.oninput = () => { r.amt = ai.value; refresh(false); };
    c2.appendChild(ai);
    m.appendChild(c2);

    const c3 = el("div");
    c3.appendChild(el("span", "mlab", esc(t("row.rate"))));
    ri.type = "number"; ri.step = "any"; ri.min = "0";
    ri.setAttribute("aria-label", t("row.rate"));
    ri.oninput = () => { r.rate = ri.value; refresh(false); };
    syncRate();
    c3.appendChild(ri);
    m.appendChild(c3);
    bd.appendChild(m);

    const v = rowJPY(r);
    const out = el("div", "jpy-out");
    out.appendChild(el("span", "", esc(t("row.jpy"))));
    const b = el("b", v !== null && v < 0 ? "neg" : "");
    b.className = "num" + (v !== null && v < 0 ? " neg" : "");
    b.textContent = v === null ? "—" : fmt(v) + (lang === "ja" ? " 円" : " JPY");
    out.appendChild(b);
    bd.appendChild(out);

    /* [FIX 3] 開く前に、誰が開くべきかを示す */
    const d = el("details", "disc");
    const sm = el("summary");
    sm.appendChild(el("span", "disc-t", esc(t("row.detail"))));
    sm.appendChild(el("span", "disc-who", esc(t(S.inherit ? "row.detail.whoInh" : "row.detail.who"))));
    d.appendChild(sm);
    const db = el("div", "disc-bd");

    const sf = el("div", "field");
    const sl = el("label", "lab"); sl.textContent = t("row.share"); sl.style.fontSize = "12.5px";
    const si = el("input");
    si.type = "number"; si.min = "0"; si.max = "100"; si.step = "any";
    si.value = r.share; si.placeholder = "100"; si.style.maxWidth = "120px";
    si.oninput = () => { r.share = si.value; refresh(false); };
    sf.appendChild(sl); sf.appendChild(si);
    sf.appendChild(el("p", "help", t("row.shareHelp")));
    db.appendChild(sf);

    if (S.inherit) {
      const il = el("label", "choice" + (r.inh ? " on" : ""));
      const ib = el("input"); ib.type = "checkbox"; ib.checked = !!r.inh;
      ib.onchange = () => { r.inh = ib.checked; refresh(true); };
      il.appendChild(ib);
      il.appendChild(el("span", "ctxt", esc(t("row.inherited"))));
      db.appendChild(il);
    }
    d.appendChild(db);
    bd.appendChild(d);
  }

  node.appendChild(bd);
  return node;
}

function questionNode(r, q) {
  const w = el("div", "wiz-q");
  // その他の財産は、内訳（sub）によって where 設問の文言が変わる
  let labKey = "q." + r.cat + "." + q.id;
  if (r.cat === "other" && q.id === "where") labKey = "q.other.where." + r.ans.sub;
  const lab = el("span", "qlab", esc(t(labKey)));
  w.appendChild(lab);

  const box = el("div", "choices");
  q.opts.forEach(o => {
    let txtKey = "q." + r.cat + "." + q.id + "." + o;
    if (r.cat === "other" && q.id === "where") txtKey = "q.other.where." + o;
    const on = r.ans[q.id] === o;
    const lb = el("label", "choice" + (on ? " on" : ""));
    const inp = el("input");
    inp.type = "radio"; inp.name = "r" + r.id + "-" + q.id; inp.checked = on;
    inp.onchange = () => {
      const before = rowVerdict(r);
      r.ans[q.id] = o;
      // 前提が変わった後続の回答をクリア
      RULES.categories[r.cat].questions.forEach(qq => {
        if (qq.when && !qq.when(r.ans)) delete r.ans[qq.id];
      });
      if (r.cat === "movables" && !rowExcludable(r)) r.excl = false;
      const after = rowVerdict(r);
      if (after && after !== before) r._stamp = true;
      refresh(true);
    };
    let inner = esc(t(txtKey));
    if (has(txtKey + ".n")) inner += '<span class="cnote">' + t(txtKey + ".n") + "</span>";
    lb.appendChild(inp);
    lb.appendChild(el("span", "ctxt", inner));
    box.appendChild(lb);
  });
  w.appendChild(box);

  let noteKey = "q." + r.cat + "." + q.id + ".note";
  if (r.cat === "other" && q.id === "sub") noteKey = "q.other.sub.note";
  if (r.cat === "other" && q.id === "where") noteKey = null;
  if (noteKey && has(noteKey)) w.appendChild(el("p", "help", t(noteKey)));

  if (r.cat === "other" && q.id === "sub" && r.ans.sub === "residual") {
    w.appendChild(el("p", "verdict-note dom", t("q.other.residualNote")));
  }
  return w;
}

/* ============================================================================
   6. RENDER — panel & result
   ============================================================================ */
function renderPanel() {
  const j = judge();
  const total = (j.total !== undefined) ? j.total : totalNow();
  document.getElementById("total-v").textContent = fmt(total);

  const pct = Math.max(0, Math.min(100, (total / (RULES.threshold * 1.5)) * 100));
  const g = document.getElementById("gauge");
  document.getElementById("gfill").style.width = pct + "%";
  g.classList.toggle("over", total > RULES.threshold);
  document.getElementById("gmark").setAttribute("data-l", t("p.threshold"));

  const badge = document.getElementById("badge");
  const why = document.getElementById("why");
  const cls = j.code === "yes" ? "yes" : (j.code === "no" || j.code === "exempt") ? "no" : "na";
  badge.className = "judg-badge " + cls;
  badge.textContent = t("j." + j.code);
  let w = t("j." + j.code + ".why", { n: j.n });
  if (j.code === "no" && total > RULES.threshold * 0.9 && total <= RULES.threshold) {
    w += " " + t("j.close", { v: fmt(RULES.threshold - total) });
  }
  why.innerHTML = nb(w);

  /* [FIX 5] 期限ステータス */
  const ck = clockOf(S.year);
  const dl = ck.dl;
  const ch = document.getElementById("clock");
  ch.innerHTML = "";
  if (j.code === "yes" || j.code === "no" || j.code === "pending") {
    const tone = ck.state === "past" ? "past" : (ck.state === "soon" || ck.state === "today") ? "soon" : "future";
    const box = el("div", "clock " + tone);
    let msg = ck.state === "progress"
      ? t("c.progress", { y: S.year })
      : t("c." + ck.state, { d: fmtDate(dl.actual), n: ck.days });
    if (ck.state === "past" && j.code === "yes") msg += " " + t("c.pastNote");
    box.innerHTML = nb(msg);
    ch.appendChild(box);
  }

  const kv = document.getElementById("kv");
  kv.innerHTML = "";
  const items = [[t("kv.year"), yearLabel(S.year)]];
  if (j.code === "yes") items.push([t("kv.deadline"), fmtDate(dl.actual)]);
  if (j.cnt !== undefined) items.push([t("kv.rows"), t("kv.rowsUnit", { n: j.cnt })]);
  if (j.excl) items.push([t("kv.excluded"), t("kv.rowsUnit", { n: j.excl })]);
  items.forEach(([k, v]) => {
    const row = el("div", "kv-r");
    row.appendChild(el("dt", "", esc(k)));
    row.appendChild(el("dd", "", esc(v)));
    kv.appendChild(row);
  });

  renderResult(j, total, ck);
}

function sec(title, bodyNodes, cls) {
  const s = el("div", "res-sec" + (cls ? " " + cls : ""));
  s.appendChild(el("h3", "", esc(title)));
  bodyNodes.forEach(n => s.appendChild(n));
  return s;
}
function p(html) { return el("p", "", html); }
function ul(items) {
  const u = el("ul");
  items.forEach(i => u.appendChild(el("li", "", i)));
  return u;
}

function renderResult(j, total, ck) {
  const host = document.getElementById("result");
  host.innerHTML = "";
  if (j.code !== "yes" && j.code !== "no") return;
  const dl = ck.dl;
  // [FIX 5] 期限が過ぎている人に最も必要なのは救済の導線なので、先頭に出す
  const overdue = (j.code === "yes" && ck.state === "past");

  const card = el("div", "res-card");
  const hd = el("div", "res-hd");
  hd.appendChild(el("h2", "", esc(t("r.title." + j.code))));
  hd.appendChild(el("p", "", esc(t("r.sub." + j.code, { y: S.year, r: reiwa(S.year), d: fmtDate(dl.actual) }))));
  card.appendChild(hd);

  const bd = el("div", "res-bd");

  /* [FIX 5] 期限経過時は救済の導線を最上段へ繰り上げる */
  if (overdue) bd.appendChild(sec(t("r.late"), [p(t("r.lateBody"))], "urgent"));

  /* breakdown */
  if (S.rows.length) {
    const tb = el("table", "breakdown");
    tb.innerHTML = "<thead><tr><th>" + esc(t("r.bd.item")) + "</th><th>" + esc(t("r.bd.cat")) +
      "</th><th>" + esc(t("r.bd.verdict")) + "</th><th>" + esc(t("r.bd.amount")) + "</th></tr></thead>";
    const tbody = el("tbody");
    S.rows.forEach(r => {
      const v = rowVerdict(r);
      const counts = rowCounts(r);
      const tr = el("tr", counts ? "" : "dom");
      const jv = rowJPY(r);
      tr.innerHTML = "<td>" + esc(r.label || t("r.bd.untitled")) + "</td><td>" + esc(t("cat." + r.cat)) +
        "</td><td>" + (v ? esc(t("seal." + v)) : "—") + "</td><td>" +
        (counts && jv !== null ? fmt(jv) : "—") + "</td>";
      tbody.appendChild(tr);
    });
    tb.appendChild(tbody);
    const tf = el("tfoot");
    tf.innerHTML = "<tr><td colspan='3'>" + esc(t("r.bd.total")) + "</td><td>" + fmt(total) + "</td></tr>";
    tb.appendChild(tf);
    bd.appendChild(sec(t("r.breakdown"), [tb]));
  }

  if (j.code === "yes") {
    const dn = [p(t("r.deadlineBody", { d: fmtDate(dl.actual) }))];
    if (dl.rolled) dn.push(p(t("r.deadlineRoll", { orig: fmtDate(dl.orig), d: fmtDate(dl.actual) })));
    if (dl.oldRule) dn.push(p(t("r.deadlineOld")));
    bd.appendChild(sec(t("r.deadline"), dn));

    const dk = ul([t("r.docs.1"), t("r.docs.2"), t("r.docs.3")]);
    bd.appendChild(sec(t("r.docs"), [dk, el("p", "help", t("r.docs.note"))]));
  }

  /* [FIX 7] 加算税の説明は色で意味を分ける。軽減は良い知らせなので緑、
     罰則だけを塗りにして突出させる。全部赤にすると階層が消える。 */
  bd.appendChild(sec(t("r.penalty"), [
    el("p", "pen good", t("r.pen.light")),
    el("p", "pen bad", t("r.pen.heavy")),
    el("p", "pen bad", t("r.pen.docs")),
    el("p", "pen crit", t("r.pen.crim"))
  ]));
  if (!overdue) bd.appendChild(sec(t("r.late"), [p(t("r.lateBody"))]));
  bd.appendChild(sec(t("r.valuation"), [
    p(t("r.valBody")),
    ul([t("r.val.1"), t("r.val.2"), t("r.val.3"), t("r.val.4")]),
    el("p", "pen bad", t("r.val.debt"))
  ]));
  bd.appendChild(sec(t("r.other"), [p(t("r.otherBody"))]));
  bd.appendChild(sec(t("r.next"), [ul([t("r.next.1"),
    '<a href="' + RULES.sources[3].url + '" target="_blank" rel="noopener">' + esc(t("r.next.2")) + "</a>",
    t("r.next.3")])]));

  card.appendChild(bd);
  host.appendChild(card);

  const dis = el("div", "disclaimer");
  dis.innerHTML = "<b>" + esc(t("disc.title")) + "</b>" + t("disc.body");
  host.appendChild(dis);
}

   7. RENDER — static chrome
   ============================================================================ */

  document.documentElement.lang = lang;
  document.title = t("app.title");
  document.querySelectorAll("[data-t]").forEach(n => { n.innerHTML = nb(t(n.getAttribute("data-t"))); });
  document.querySelectorAll(".lang button").forEach(b => {
    b.setAttribute("aria-pressed", b.dataset.lang === lang ? "true" : "false");
  });

  /* residency */
  const rh = document.getElementById("residency");
  rh.innerHTML = "";
  ["resident", "nonperm", "nonres"].forEach(k => {
    const on = S.residency === k;
    const lb = el("label", "choice" + (on ? " on" : ""));
    const inp = el("input");
    inp.type = "radio"; inp.name = "residency"; inp.checked = on;
    inp.onchange = () => { S.residency = k; refresh(true); };
    lb.appendChild(inp);
    lb.appendChild(el("span", "ctxt", esc(t("s1.opt." + k)) + '<span class="cnote">' + esc(t("s1.opt." + k + ".n")) + "</span>"));
    rh.appendChild(lb);
  });

  /* year */
  const y = document.getElementById("year");
  y.innerHTML = "";
  yearList().forEach(v => {
    const o = new Option(yearLabel(v), v);

    y.appendChild(o);

  document.getElementById("exempt").checked = !!S.exempt;
  document.getElementById("inherit").checked = !!S.inherit;
  document.getElementById("exempt-l").classList.toggle("on", !!S.exempt);
  document.getElementById("inherit-l").classList.toggle("on", !!S.inherit);
  if (S.exempt) document.getElementById("disc-exempt").open = true;
  if (S.inherit) document.getElementById("disc-inherit").open = true;

  /* [FIX 4] TTBの説明 */
  const rhelp = document.getElementById("rate-help");
  rhelp.innerHTML = "";
  const rh3 = (k, first) => {

    return n;
  };
  rhelp.appendChild(rh3("rate.h1", true));
  ["rate.p1", "rate.p2", "rate.p3"].forEach(k => rhelp.appendChild(el("p", "help", t(k))));
  rhelp.appendChild(rh3("rate.h2"));
  const rl = ul([t("rate.l1"), t("rate.l2"), t("rate.l3")]);
  rl.className = "help";
  rl.style.cssText = "padding-left:1.15em;margin:6px 0 0";
  rhelp.appendChild(rl);
  rhelp.appendChild(rh3("rate.h3"));
  ["rate.p4", "rate.p5"].forEach(k => rhelp.appendChild(el("p", "help", t(k))));

  /* sources */
  const src = document.getElementById("src");
  src.innerHTML = "";

  });
  const ref = document.getElementById("ref");
  ref.innerHTML = "";
  RULES.refs.forEach(s => {
    let html = '<a href="' + s.url + '" target="_blank" rel="noopener">' + esc(t(s.key)) + "</a>";
    if (has(s.key + ".n")) html += '<br><span class="ref">' + esc(t(s.key + ".n")) + "</span>";
    ref.appendChild(el("li", "", html));
  });
  const f = document.querySelector('[data-t="f.updated"]');
  f.textContent = t("f.updated", { u: RULES.updated, tb: RULES.basis.taxanswer, fb: RULES.basis.faq });

  const dlst = document.getElementById("ccy-list");
  dlst.innerHTML = "";
  RULES.currencies.forEach(c => dlst.appendChild(new Option(c, c)));
}

/* ============================================================================
   8. URL STATE (no storage — hash only)
   ============================================================================ */
function b64e(s) { return btoa(String.fromCharCode.apply(null, new TextEncoder().encode(s))).replace(/=+$/, ""); }
function b64d(s) {
  const bin = atob(s.replace(/-/g, "+").replace(/_/g, "/"));
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(arr);
}
function encodeState() {
  const o = {
    v: 1, l: lang, y: S.year, r: S.residency, e: S.exempt ? 1 : 0, i: S.inherit ? 1 : 0,
    rows: S.rows.map(r => ({ c: r.cat, a: r.ans, u: r.ccy, m: r.amt, t: r.rate, s: r.share, x: r.excl ? 1 : 0, h: r.inh ? 1 : 0, n: r.label }))
  };
  try { return b64e(JSON.stringify(o)); } catch (e) { return ""; }
}
function decodeState(h) {
  try {
    const o = JSON.parse(b64d(h));
    if (!o || o.v !== 1) return false;
    if (o.l === "en" || o.l === "ja") lang = o.l;
    S = blankState();
    if (yearList().indexOf(o.y) >= 0) S.year = o.y;
    if (["resident", "nonperm", "nonres"].indexOf(o.r) >= 0) S.residency = o.r;
    S.exempt = !!o.e; S.inherit = !!o.i;
    (o.rows || []).forEach(x => {
      const r = newRow();
      if (RULES.categories[x.c]) r.cat = x.c;
      r.ans = (x.a && typeof x.a === "object") ? x.a : {};
      r.ccy = String(x.u || "JPY").toUpperCase().slice(0, 4);
      r.amt = x.m == null ? "" : String(x.m);
      r.rate = x.t == null ? "" : String(x.t);
      r.share = x.s == null ? "" : String(x.s);
      r.excl = !!x.x; r.inh = !!x.h;
      r.label = String(x.n || "").slice(0, 120);
      S.rows.push(r);
    });
    return true;
  } catch (e) { return false; }
}

/* ============================================================================
   9. WIRE
   ============================================================================ */
function refresh(full) { if (full) renderRows(); renderPanel(); }
function redraw() { renderChrome(); renderRows(); renderPanel(); }

function boot() {
  S = blankState();
  const h = location.hash.replace(/^#s=/, "");
  if (h && location.hash.indexOf("#s=") === 0) decodeState(h);
  redraw();
}

document.querySelectorAll(".lang button").forEach(b => {
  b.onclick = () => { lang = b.dataset.lang; redraw(); };
});
document.getElementById("year").onchange = e => { S.year = parseInt(e.target.value, 10); renderPanel(); };
document.getElementById("exempt").onchange = e => {
  S.exempt = e.target.checked;
  document.getElementById("exempt-l").classList.toggle("on", S.exempt);
  renderPanel();
};
document.getElementById("inherit").onchange = e => {
  S.inherit = e.target.checked;
  document.getElementById("inherit-l").classList.toggle("on", S.inherit);
  refresh(true);
};
document.getElementById("addrow").onclick = () => { S.rows.push(newRow()); refresh(true); };
document.getElementById("reset").onclick = () => {
  S = blankState();
  if (history.replaceState) history.replaceState(null, "", location.pathname + location.search);
  else location.hash = "";
  document.getElementById("disc-exempt").open = false;
  document.getElementById("disc-inherit").open = false;
  redraw();
};
document.getElementById("print").onclick = () => window.print();
document.getElementById("share").onclick = () => {
  const enc = encodeState();
  const url = location.origin && location.origin !== "null"
    ? location.origin + location.pathname + location.search + "#s=" + enc
    : location.href.split("#")[0] + "#s=" + enc;
  location.hash = "s=" + enc;
  const note = document.getElementById("copied");
  const done = ok => { note.textContent = ok ? t("act.copied") : t("act.copyfail"); setTimeout(() => note.textContent = "", 3200); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => done(true), () => done(false));
  } else {
    const ta = el("textarea"); ta.value = url;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
    document.body.removeChild(ta); done(ok);
  }
};
document.getElementById("ptoggle").onclick = () => document.getElementById("panel").classList.toggle("expand");

boot();
